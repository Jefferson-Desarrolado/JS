<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="pagina">

    </div>
    <input id="comentario" type="text">
    
    <button id="add" >Comentar</button>
</body>
</html>
<script>
    let boton=document.getElementById("add");
    boton.addEventListener("click",()=>{
        let comen=document.getElementById("comentario");
        let pagina=document.getElementById("pagina");
        let comentarios=new Array();
        comentarios.push(comen.value);
        
        let datp=comentarios.map(m=>m).join(" ");
        console.log(datp)
        let i=1;
        while(comen!=='')
        {
            return i++;
            console.log(i)
            return pagina.innerHTML+="<h1 id="+(i)+">"+datp+"</h1>";   
        }
        
        comen.value='';

    })
</script>
